<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Recipe App{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/style.css?v={{ cache_version }}">
</head>

<body>

<header>
    <h1>🍳 Daily Dish</h1>

    <nav>
        <a href="/dashboard">Dashboard</a>
        {% if is_logged_in %}
            <a href="/favourites">Meine Favoriten</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<script src="/static/js/api.js?v={{ cache_version }}"></script>
<script src="/static/js/app.js?v={{ cache_version }}"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
